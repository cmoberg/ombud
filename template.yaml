AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  ProfileBucket:
    Type: String
    Default: ""
    Description: "S3 bucket containing profile YAMLs. Leave empty to use bundled profiles."
  ProfileKeyPrefix:
    Type: String
    Default: "profiles"
    Description: "S3 key prefix for profile YAMLs."
  CandidateId:
    Type: String
    Default: "candidate"
    Description: "Candidate profile ID (filename without .yaml). Set to your own ID when forking."
  AdminToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Bearer token required for profile write operations (PUT /api/profile). Set a strong random value."
  PublicBaseUrl:
    Type: String
    Default: ""
    Description: "Optional public HTTPS base URL for the web UI and displayed MCP endpoint. Only set this if the domain forwards POST /mcp to the Lambda Function URL unchanged (for example https://ombud.cmoberg.com)."
  CorsAllowOrigin:
    Type: String
    Default: "*"
    Description: >
      CORS allowed origin for the Function URL. Restrict to your deployed domain in production
      (e.g. https://abc123.lambda-url.eu-north-1.on.aws). MCP clients are not browser-based
      and are unaffected by CORS; this only matters for browser-initiated requests.

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30

Resources:
  OmbudLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365

  OmbudFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: server.handler
      Environment:
        Variables:
          PROFILE_BUCKET: !Ref ProfileBucket
          PROFILE_KEY_PREFIX: !Ref ProfileKeyPrefix
          CANDIDATE_ID: !Ref CandidateId
          ADMIN_TOKEN: !Ref AdminToken
          PUBLIC_BASE_URL: !Ref PublicBaseUrl
          LOG_BUCKET: !Ref OmbudLogBucket
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: !Split [",", !Ref CorsAllowOrigin]
          AllowMethods: ["GET", "POST", "PUT", "DELETE"]
          AllowHeaders: ["*"]
          MaxAge: 86400

  OmbudLogBucketPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: OmbudLogBucketAccess
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: ["s3:GetObject", "s3:PutObject"]
            Resource: !Sub "${OmbudLogBucket.Arn}/logs/*"
          - Effect: Allow
            Action: "s3:ListBucket"
            Resource: !GetAtt OmbudLogBucket.Arn
            Condition:
              StringLike:
                s3:prefix: "logs/*"
      Roles:
        - !Ref OmbudFunctionRole

  OmbudS3Policy:
    Type: AWS::IAM::Policy
    Condition: HasProfileBucket
    Properties:
      PolicyName: OmbudS3Access
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: ["s3:GetObject", "s3:PutObject"]
            Resource: !Sub "arn:aws:s3:::${ProfileBucket}/${ProfileKeyPrefix}/*"
      Roles:
        - !Ref OmbudFunctionRole

Conditions:
  HasProfileBucket: !Not [!Equals [!Ref ProfileBucket, ""]]

Outputs:
  FunctionUrl:
    Description: "MCP server endpoint — use this as your MCP server URL (append /mcp)"
    Value: !GetAtt OmbudFunctionUrl.FunctionUrl
  UIUrl:
    Description: "Candidate web UI"
    Value: !GetAtt OmbudFunctionUrl.FunctionUrl
